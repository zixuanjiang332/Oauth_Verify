server-id: "survival-1"

# 插件向验证中心申请玩家专属验证链接。
verification-generate-endpoint: "https://www.chaos-smp.cn/verify/gen"

# 插件用 gen 返回的 token 查询验证结果。
verification-result-endpoint: "https://www.chaos-smp.cn/verify/get"

# 必须与外部验证服务配置的 API Key 保持一致。
# 正式服请使用足够长的随机值。
api-key: "local-test-api-key-change-me"

database-file: "msverify.db"

challenge:
  ttl-seconds: 300

poller:
  enabled: true
  interval-seconds: 15
  request-timeout-seconds: 10

messages:
  reload: "MsVerify 配置已重新加载。"
  no-permission: "你没有权限使用这个命令。"
  usage: "用法：/msverify <reload|status|unverify>"
